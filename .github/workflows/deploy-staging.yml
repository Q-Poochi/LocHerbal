name: Deploy Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    needs: []

    environment:
      name: staging
      url: https://api-staging.locherbal.com

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: LOCPROJECT/package-lock.json

      - name: Install dependencies
        working-directory: LOCPROJECT
        run: npm ci --production

      - name: Build
        working-directory: LOCPROJECT
        run: npm run build
        env:
          NODE_ENV: production

      - name: Run migrations (staging DB)
        working-directory: LOCPROJECT
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.STAGING_DIRECT_URL }}

      - name: Deploy to staging
        run: |
          echo "Deploy backend to staging..."
          echo "Staging URL: ${{ vars.STAGING_BACKEND_URL }}"
          echo "TODO: thêm deploy command thật (Railway/Fly/Azure) sau khi chọn provider"

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: [deploy-backend]

    environment:
      name: staging
      url: https://staging.locherbal.com

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: locproject-frontend/package-lock.json

      - name: Install dependencies
        working-directory: locproject-frontend
        run: npm ci

      - name: Build
        working-directory: locproject-frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.STAGING_API_URL }}

      - name: Deploy to staging
        run: |
          echo "Deploy frontend to staging..."
          echo "TODO: thêm deploy command thật (Vercel CLI/Netlify/Azure) sau khi chọn provider"